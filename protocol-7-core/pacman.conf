# /etc/pacman.conf – Protocol 7 Sovereign Package Manager Configuration
# Layer 02 – no systemd, no polkit, no bloat

[options]
RootDir     = /
DBPath      = /var/lib/pacman/
CacheDir    = /var/cache/pacman/pkg/
LogFile     = /var/log/pacman.log
GPGDir      = /etc/pacman.d/gnupg/
HookDir     = /etc/pacman.d/hooks/
Architecture = auto

# Protect sovereign shims, mocks, and Protocol 7 binaries from upstream overwrite
NoUpgrade   = usr/lib/libsystemd.so*
NoUpgrade   = usr/lib/libsystemd.so.0
NoUpgrade   = usr/lib/libdbus-1.so.3
NoUpgrade   = usr/bin/lainos-*
NoUpgrade   = usr/bin/bardo-*
NoUpgrade   = etc/lainos/*
NoUpgrade   = var/lib/lainos/*
NoUpgrade   = usr/lib/lainos/*          # ← added: catch any shared libs in /usr/lib/lainos/

# Permanently ignore systemd middleware and polkit/elogind stack
IgnorePkg   = systemd systemd-libs systemd-sysvcompat systemd-resolvconf systemd-ukify systemd-boot systemd-homed systemd-journal-remote
IgnorePkg   = polkit elogind dbus-broker

# Prevent systemd unit/config pollution even if package slips through
NoExtract   = etc/systemd/*
NoExtract   = usr/lib/systemd/*
NoExtract   = usr/share/systemd/*

# Misc
ParallelDownloads = 3
Color             = Never
CleanMethod       = KeepInstalled
SigLevel          = Required DatabaseOptional
LocalFileSigLevel = Optional

# Local repo first (Protocol 7 metapackages & mocks)
[protocol7-local]
Server   = file:///var/cache/pacman/protocol7-local
SigLevel = Never

# Arch official repos
[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

# Artix official repo
[system]
Include = /etc/pacman.d/mirrorlist-artix 